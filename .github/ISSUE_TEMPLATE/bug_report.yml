name: Bug report
description: Something in Kerf isn't working as expected.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more detail you can share, the faster we can help.

        **Security issue?** Stop and email security@smoothgrain.app instead — see [SECURITY.md](https://github.com/SmoothGrain/kerf-issues/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you saw.
      placeholder: "I clicked Apply CSS and the preview went blank."
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect to happen?
      placeholder: "The preview should have updated with the new styles."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps we can follow to hit the same problem.
      placeholder: |
        1. Open a workspace with `index.html` + `style.css`.
        2. Click an element in the preview.
        3. Change a property in the inspector.
        4. Click Apply.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kerf version
      description: Find it in Settings → About, or in the avatar menu.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "macOS 14.3 / Windows 11 23H2 / Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: |
        Relevant excerpts from Kerf's logs. Find the log directory via Settings → About → "Open logs folder", or:
        - macOS: `~/Library/Logs/Kerf/`
        - Windows: `%APPDATA%\Kerf\logs\`
        - Linux: `~/.config/Kerf/logs/`
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording (optional)
      description: Drag images or video files into this field to attach them.
